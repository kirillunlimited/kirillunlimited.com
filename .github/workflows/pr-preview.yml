name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preview:
    runs-on: ubuntu-latest

    environment:
      name: preview
      url: ${{ steps.set_url.outputs.preview_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Build site
        run: yarn build
        env:
          ELEVENTY_PATH_PREFIX: /kirillunlimited.com/pr-${{ github.event.number }}/

      - name: Deploy (PR preview)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.number }}
          keep_files: true

      - name: Set preview URL
        id: set_url
        run: |
          echo "preview_url=https://kirillunlimited.github.io/kirillunlimited.com/pr-${{ github.event.number }}/" >> $GITHUB_OUTPUT
