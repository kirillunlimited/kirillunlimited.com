name: Deploy Check (Cloudflare)

on:
  pull_request:
    branches:
      - master

jobs:
  deploy-check:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for preview deploy
        run: |
          BRANCH=${{ github.head_ref }}
          URL="https://${BRANCH}.kirillunlimited-com.pages.dev"
          COMMIT_SHA=${{ github.event.pull_request.head.sha }}

          echo "Checking $URL for commit $COMMIT_SHA"

          for i in {1..30}; do
            RESPONSE=$(curl -s "$URL/manifest.webmanifest?cache-bust=$(date +%s)")

            if echo "$RESPONSE" | grep "$COMMIT_SHA"; then
              echo "✅ Deploy is ready"
              exit 0
            fi

            echo "⏳ Waiting..."
            sleep 5
          done

          echo "❌ Deploy not ready"
          exit 1
